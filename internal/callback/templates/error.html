<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232B3D6B'><path d='M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm-1.5 14.59l-3.54-3.54 1.41-1.41 2.13 2.13 5.17-5.17 1.41 1.41-6.58 6.58z'/></svg>">
<title>{{.Title}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f5f5f5;color:#333}
.card{text-align:center;padding:2.5rem 3rem;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);max-width:420px;width:90%}
.emoji{font-size:3rem;margin-bottom:.5rem}
h1{font-size:1.4rem;margin-bottom:.5rem}
.msg{color:#666;font-size:.95rem}
@media(prefers-color-scheme:dark){
body{background:#1a1a1a;color:#e0e0e0}
.card{background:#2a2a2a;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.msg{color:#aaa}
}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">❌</div>
  <h1>{{.Title}}</h1>
  <p class="msg">{{.Message}}</p>
</div>
</body>
</html>
