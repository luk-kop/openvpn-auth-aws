# Docker Compose override for testing with real AWS Cognito.
#
# Usage:
#   1. Deploy terraform/ with cognito_only=true to create Cognito resources
#   2. Copy lab/aws.env.example to lab/aws.env and fill in values from terraform output
#   3. Create a test user in Cognito and add them to the vpn-users group
#   4. Run: make stack-aws-up
#   5. Connect: sudo openvpn --config lab/client.ovpn
#   6. Browser opens Cognito hosted UI — log in with the test user
#
# The lambda-mock service is replaced with a local Lambda handler that
# redirects to real Cognito. The daemon uses real Cognito token exchange
# and JWT validation (public endpoints, no AWS credentials needed).
# Reauth uses --local-identity to skip AdminGetUser.

services:
  daemon:
    env_file: aws.env
    environment:
      - VPN_AUTH_USE_LOCAL_MOCKS=false
      - VPN_AUTH_LOCAL_IDENTITY=true
      - VPN_AUTH_CN_CROSS_CHECK=false
      - VPN_AUTH_HMAC_SECRET=test-secret
      - VPN_AUTH_MANAGEMENT_SOCKET=/run/openvpn/management.sock
      - VPN_AUTH_MANAGEMENT_PASSWORD_FILE=/etc/openvpn/management-pw
      - VPN_AUTH_CALLBACK_PORT=8081
      - VPN_AUTH_INSTANCE_IP=daemon
      - VPN_AUTH_API_GATEWAY_URL=http://localhost:8080

  # Override lambda-mock with real Lambda handler pointing to Cognito
  lambda-mock:
    build:
      context: ..
      dockerfile: lab/Dockerfile.lambda
    env_file: aws.env
    environment:
      - HMAC_SECRET=test-secret
      - LISTEN_ADDR=:8080
      - COGNITO_REDIRECT_URI=http://localhost:8080/callback
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/')\" 2>&1 || true"]
      interval: 5s
      timeout: 3s
      retries: 10
