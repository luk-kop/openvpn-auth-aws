services:
  openvpn:
    build:
      context: ..
      dockerfile: lab/Dockerfile.openvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "1194:1194/udp"
    volumes:
      - ./openvpn-data:/etc/openvpn
      - openvpn-run:/run/openvpn
    healthcheck:
      test: ["CMD", "test", "-S", "/run/openvpn/management.sock"]
      interval: 5s
      timeout: 3s
      retries: 20

  daemon:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      openvpn:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - openvpn-run:/run/openvpn
      - ./openvpn-data:/etc/openvpn:ro
    environment:
      - VPN_AUTH_USE_LOCAL_MOCKS=true
      - VPN_AUTH_CN_CROSS_CHECK=false
      - VPN_AUTH_HMAC_SECRET=test-secret
      - VPN_AUTH_API_GATEWAY_URL=http://localhost:8080
      - VPN_AUTH_MANAGEMENT_SOCKET=/run/openvpn/management.sock
      - VPN_AUTH_MANAGEMENT_PASSWORD_FILE=/etc/openvpn/management-pw
      - VPN_AUTH_CALLBACK_PORT=8081
      - VPN_AUTH_INSTANCE_IP=daemon
    command: /app/openvpn-auth-daemon

  lambda-mock:
    build:
      context: ..
      dockerfile: lab/Dockerfile.lambda-mock
    ports:
      - "8080:8080"
    environment:
      - VPN_AUTH_HMAC_SECRET=test-secret

volumes:
  openvpn-run:
