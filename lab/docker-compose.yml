services:
  openvpn:
    build:
      context: ..
      dockerfile: lab/Dockerfile.openvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "1194:1194/udp"
    volumes:
      - ./openvpn-data:/etc/openvpn
      - openvpn-run:/run/openvpn
    healthcheck:
      test: ["CMD", "test", "-S", "/run/openvpn/management.sock"]
      interval: 5s
      timeout: 3s
      retries: 20

  daemon:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      openvpn:
        condition: service_healthy
      alb-mock:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - openvpn-run:/run/openvpn
      - ./openvpn-data:/etc/openvpn:ro
    environment:
      - VPN_AUTH_CN_CROSS_CHECK=false
      - VPN_AUTH_HMAC_SECRET=test-secret
      - VPN_AUTH_CALLBACK_URL=http://localhost:8080/callback/01/udp
      - VPN_AUTH_COGNITO_SKIP_REAUTH=true
      - VPN_AUTH_COGNITO_GROUPS_FROM_CLAIMS=true
      - VPN_AUTH_MANAGEMENT_SOCKET=/run/openvpn/management.sock
      - VPN_AUTH_MANAGEMENT_PASSWORD_FILE=/etc/openvpn/management-pw
      - VPN_AUTH_CALLBACK_PORT=8081
      - VPN_AUTH_SERVER_NAME=lab-dev
      # VPN_AUTH_ALB_ARN not set — absent = skip JWT signature validation in dev
    command: /app/openvpn-auth-daemon

  alb-mock:
    build:
      context: ..
      dockerfile: lab/Dockerfile.alb-mock
    ports:
      - "8080:8080"
    environment:
      - DAEMON_ADDR=daemon:8081
      - MOCK_EMAIL=test@example.com
      - MOCK_SUB=test-sub-123
      - MOCK_GROUPS=vpn-users
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  openvpn-run:
