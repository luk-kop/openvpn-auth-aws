name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format Check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Module Tidy Check
        run: go mod tidy -diff

      - name: Lint daemon
        uses: golangci/golangci-lint-action@v9

      - name: Vet daemon
        run: go vet ./...

      - name: Module Tidy Check Lambda Router
        run: cd lambda-router && go mod tidy -diff

      - name: Lint Lambda Router
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: lambda-router

      - name: Vet Lambda Router
        run: cd lambda-router && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test daemon
        run: go test -v -short ./...

      - name: Test Lambda Router
        run: cd lambda-router && go test -v -short ./...

  race-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Race Test daemon
        run: go test -race -short ./...

      - name: Race Test Lambda Router
        run: cd lambda-router && go test -race -short ./...

  release:
    runs-on: ubuntu-latest
    needs: [lint, test, race-test]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: make build-release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          V="${TAG#v}"
          gh release create "$TAG" \
            "bin/openvpn-auth-daemon_${V}_linux_amd64.tar.gz" \
            "bin/openvpn-auth-daemon_${V}_linux_arm64.tar.gz" \
            "bin/lambda-router_${V}_linux_amd64.zip" \
            "bin/lambda-router_${V}_linux_arm64.zip" \
            "bin/checksums.txt" \
            --generate-notes
